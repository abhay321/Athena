version: '3.8'

services:
  athena-builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: athena_apk_builder
    volumes:
      # Mount the local project directory to compilation workspace
      - .:/workspace
      # Keep Gradle caches persistent across runs to speed up consecutive compilations
      - gradle-cache:/root/.gradle
    environment:
      - GRADLE_USER_HOME=/root/.gradle
    # Ensure correct executing permissions are set and download uncorrupted gradle-wrapper.jar if needed
    entrypoint: >
      bash -c "
      if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ $$(stat -c%s gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo 0) -lt 10000 ]; then
        echo 'Downloading a fresh, uncorrupted Gradle wrapper binary...';
        mkdir -p gradle/wrapper;
        wget -q -O gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/main/gradle/wrapper/gradle-wrapper.jar;
      fi;
      chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon"

volumes:
  gradle-cache:
