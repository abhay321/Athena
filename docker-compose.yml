services:
  athena-builder:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: athena_apk_builder
    volumes:
      # Mount the local project directory to compilation workspace
      - .:/workspace
      # Keep Gradle caches persistent across runs to speed up consecutive compilations
      - gradle-cache:/root/.gradle
    environment:
      - GRADLE_USER_HOME=/root/.gradle
    # Compile the APK directly using the pre-installed container Gradle compiler, ignoring host wrapper file corruption
    entrypoint: gradle assembleDebug --no-daemon

volumes:
  gradle-cache:
