services:
  athena-builder:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: athena_apk_builder
    volumes:
      # Mount the local project directory to compilation workspace
      - .:/workspace
      # Keep Gradle caches persistent across runs to speed up consecutive compilations
      - gradle-cache:/root/.gradle
    environment:
      - GRADLE_USER_HOME=/root/.gradle
    # Restore debug.keystore from base64 if missing, then compile the APK directly using the container Gradle
    entrypoint: >
      bash -c "
      if [ ! -f debug.keystore ] && [ -f debug.keystore.base64 ]; then
        echo 'Restoring debug.keystore from base64 representation...';
        base64 -d debug.keystore.base64 > debug.keystore 2>/dev/null || base64 --decode debug.keystore.base64 > debug.keystore;
      fi;
      gradle assembleDebug --no-daemon"

volumes:
  gradle-cache:
