services:
  athena-builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: athena_apk_builder
    volumes:
      # Mount the local project directory to compilation workspace
      - .:/workspace
      # Keep Gradle caches persistent across runs to speed up consecutive compilations
      - gradle-cache:/root/.gradle
    environment:
      - GRADLE_USER_HOME=/root/.gradle
    # Ensure correct executing permissions are set and download/re-verify gradle-wrapper.jar if corrupted or missing
    entrypoint: >
      bash -c "
      if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || ! unzip -t gradle/wrapper/gradle-wrapper.jar &>/dev/null; then
        echo 'Gradle wrapper jar is missing or corrupted. Downloading a fresh, uncorrupted Gradle wrapper binary...';
        mkdir -p gradle/wrapper;
        wget -q -O gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/main/gradle/wrapper/gradle-wrapper.jar;
      fi;
      chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon"

volumes:
  gradle-cache:
